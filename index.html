<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kartenspiel</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #2e7d32;
        color: white;
    }

    .kartenbereich {
        display: flex;
        justify-content: center;
        gap: 50px;
        margin: 30px;
    }

    .karte {
        width: 120px;
        height: 170px;
        background: white;
        color: black;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        font-weight: bold;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    button {
        padding: 12px 24px;
        font-size: 18px;
        cursor: pointer;
    }

    #status {
        font-size: 22px;
        margin: 20px;
    }
</style>
</head>
<body>

<h1>Simons Game Challenge</h1>

<p>Jeder Spieler zieht eine Karte. Die höhere Karte gewinnt.</p>

<h2>Punkte</h2>
<p>Spieler: <span id="punkte1">0</span> |
Computer: <span id="punkte2">0</span></p>

<div class="kartenbereich">
    <div>
        <h3>Spieler</h3>
        <div class="karte" id="karte1">?</div>
    </div>

    <div>
        <h3>Computer</h3>
        <div class="karte" id="karte2">?</div>
    </div>
</div>

<button onclick="ziehen()">Karte ziehen</button>

<p id="status">Drücke auf „Karte ziehen“.</p>
<p>Noch übrig: <span id="rest">20</span> Karten</p>

<script>
let deck = [];
for(let i = 1; i <= 20; i++) {
    deck.push(i);
}

deck = mischen(deck);

let punkteSpieler = 0;
let punkteComputer = 0;

function mischen(array) {
    for(let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function ziehen() {

    if(deck.length < 2) {
        let text = "Spiel vorbei! ";

        if(punkteSpieler > punkteComputer)
            text += "Du hast gewonnen!";
        else if(punkteComputer > punkteSpieler)
            text += "Der Computer gewinnt!";
        else
            text += "Unentschieden!";

        document.getElementById("status").innerText = text;
        return;
    }

    let spielerKarte = deck.pop();
    let computerKarte = deck.pop();

    document.getElementById("karte1").innerText = spielerKarte;
    document.getElementById("karte2").innerText = computerKarte;

    if(spielerKarte > computerKarte) {
        punkteSpieler++;
        document.getElementById("status").innerText =
            "Du gewinnst diese Runde!";
    }
    else if(computerKarte > spielerKarte) {
        punkteComputer++;
        document.getElementById("status").innerText =
            "Der Computer gewinnt diese Runde!";
    }
    else {
        document.getElementById("status").innerText =
            "Unentschieden!";
    }

    document.getElementById("punkte1").innerText = punkteSpieler;
    document.getElementById("punkte2").innerText = punkteComputer;
    document.getElementById("rest").innerText = deck.length;
}
</script>

</body>
</html>
